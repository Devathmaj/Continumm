apiVersion: v1
kind: Service
metadata:
  name: backend-telemetry
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/path: "/metrics"
    prometheus.io/port: "8000"
spec:
  type: ClusterIP
  selector:
    app: backend-telemetry
  ports:
    - name: http
      port: 8000
      targetPort: 8000
