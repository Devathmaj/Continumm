apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
      external_labels:
        cluster: 'continumm-local'
        environment: 'production'

    rule_files:
      - /etc/prometheus/alert_rules.yml

    alerting:
      alertmanagers:
        - static_configs:
            - targets: ['alertmanager:9093']

    scrape_configs:
      - job_name: 'backend'
        honor_timestamps: false
        static_configs:
          - targets: ['backend:8000']
            labels:
              service: 'continumm-backend'
              component: 'application'
        metrics_path: '/metrics'
        scrape_interval: 10s
        scrape_timeout: 5s

      - job_name: 'backend-telemetry'
        honor_timestamps: false
        static_configs:
          - targets: ['backend-telemetry:8000']
            labels:
              service: 'continumm-backend-telemetry'
              component: 'telemetry'
        metrics_path: '/metrics'
        scrape_interval: 10s
        scrape_timeout: 5s

      - job_name: 'node_exporter'
        honor_timestamps: false
        static_configs:
          - targets: ['node-exporter:9100']
            labels:
              service: 'node-exporter'
              component: 'infrastructure'
        scrape_interval: 15s
        scrape_timeout: 10s

      - job_name: 'prometheus'
        honor_timestamps: false
        static_configs:
          - targets: ['localhost:9090']
            labels:
              service: 'prometheus'
              component: 'monitoring'

      - job_name: 'alertmanager'
        honor_timestamps: false
        static_configs:
          - targets: ['alertmanager:9093']
            labels:
              service: 'alertmanager'
              component: 'monitoring'

  alert_rules.yml: |
    groups:
      - name: continumm-network-alerts
        rules:
          - alert: NetworkDeviceOffline
            expr: network_device_online == 0
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "Device offline"
              description: "{{ $labels.ip }} is offline"

          - alert: NetworkLatencyHigh
            expr: network_device_latency_ms > 200
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "High latency"
              description: "{{ $labels.ip }} latency above 200ms"

          - alert: NetworkPacketLossHigh
            expr: network_device_packet_loss_percent > 20
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Packet loss"
              description: "{{ $labels.ip }} packet loss above 20%"

          - alert: NetworkDeviceFlapping
            expr: changes(network_device_online[10m]) > 4
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Device flapping"
              description: "{{ $labels.ip }} toggled online/offline frequently"
