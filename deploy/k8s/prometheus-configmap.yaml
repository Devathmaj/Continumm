apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
      external_labels:
        cluster: 'continumm-local'
        environment: 'production'

    scrape_configs:
      - job_name: 'backend'
        static_configs:
          - targets: ['backend:8000']
            labels:
              service: 'continumm-backend'
              component: 'application'
        metrics_path: '/metrics'
        scrape_interval: 10s
        scrape_timeout: 5s

      - job_name: 'node_exporter'
        static_configs:
          - targets: ['node-exporter:9100']
            labels:
              service: 'node-exporter'
              component: 'infrastructure'
        scrape_interval: 15s
        scrape_timeout: 10s

      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']
            labels:
              service: 'prometheus'
              component: 'monitoring'
