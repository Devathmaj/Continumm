apiVersion: apps/v1
kind: Deployment
metadata:
  name: continumm-grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: continumm-grafana
  template:
    metadata:
      labels:
        app: continumm-grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:10.2.2
          ports:
            - containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: "admin"
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: "changeme"
            - name: GF_USERS_ALLOW_SIGN_UP
              value: "false"
            - name: GF_SERVER_ROOT_URL
              value: "http://localhost:3000"
            - name: GF_INSTALL_PLUGINS
              value: ""
          volumeMounts:
            - name: grafana-data
              mountPath: /var/lib/grafana
            - name: grafana-provisioning
              mountPath: /etc/grafana/provisioning
      volumes:
        - name: grafana-data
          persistentVolumeClaim:
            claimName: grafana-data
        - name: grafana-provisioning
          configMap:
            name: continumm-grafana-provisioning
            items:
              - key: datasources.yaml
                path: datasources/prometheus.yml
              - key: dashboards.yaml
                path: dashboards/dashboard.yml
              - key: continumm-backend.json
                path: dashboards/continumm-backend.json
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grafana-data
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
