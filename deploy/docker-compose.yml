# Continumm Production Stack - Docker Compose
# Single-node production environment with full observability
# 
# Key rules:
# - Backend NOT exposed publicly (no port binding)
# - Only Nginx binds to port 80
# - Metrics ports restricted to internal network
# - All services on isolated network

networks:
  continumm-internal:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/16

volumes:
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
  loki-data:
    driver: local
  postgres-data:
    driver: local

services:
  # Backend application - NOT exposed publicly
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
      args:
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
    container_name: continumm-backend
    restart: unless-stopped
    # NO PORT BINDING - only accessible via internal network
    expose:
      - "8000"
    environment:
      - PORT=8000
      - HOST=0.0.0.0
      - ENVIRONMENT=production
      - LOG_LEVEL=INFO
      - GIT_COMMIT=${GIT_COMMIT:-unknown}
      - DATABASE_URL=${DATABASE_URL:-postgresql://continumm:continumm@postgres:5432/continumm}
      - TELEMETRY_ENABLED=${TELEMETRY_ENABLED:-false}
      - SCAN_SUBNETS=${SCAN_SUBNETS:-}
      - DISCOVERY_INTERVAL_SECONDS=${DISCOVERY_INTERVAL_SECONDS:-300}
      - POLL_INTERVAL_SECONDS=${POLL_INTERVAL_SECONDS:-30}
      - PORT_SCAN_ENABLED=${PORT_SCAN_ENABLED:-false}
      - PORT_SCAN_TOP_PORTS=${PORT_SCAN_TOP_PORTS:-50}
      - PORT_SCAN_LIMIT=${PORT_SCAN_LIMIT:-25}
      - SCAN_USE_ARP=${SCAN_USE_ARP:-true}
      - SCAN_USE_SCAPY=${SCAN_USE_SCAPY:-false}
      - SCAN_USE_NMAP=${SCAN_USE_NMAP:-true}
      - ALERT_OFFLINE_AFTER=${ALERT_OFFLINE_AFTER:-3}
      - ALERT_LATENCY_MS=${ALERT_LATENCY_MS:-200}
      - ALERT_PACKET_LOSS_PERCENT=${ALERT_PACKET_LOSS_PERCENT:-20}
      - OTEL_ENABLED=${OTEL_ENABLED:-false}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-tempo:4317}
    networks:
      - continumm-internal
    depends_on:
      - postgres
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Nginx reverse proxy - ONLY public-facing service
  nginx:
    image: nginx:1.25-alpine
    container_name: continumm-nginx
    restart: unless-stopped
    ports:
      - "80:80"  # Only service exposed to host
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - continumm-internal
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Prometheus - metrics collection and storage
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: continumm-prometheus
    restart: unless-stopped
    # Metrics port restricted - only exposed for internal access
    ports:
      - "127.0.0.1:9090:9090"  # Bound to localhost only
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    depends_on:
      - postgres
      - backend
      - alertmanager
      - node_exporter
    networks:
      - continumm-internal
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Grafana - metrics visualization
  grafana:
    image: grafana/grafana:latest
    container_name: continumm-grafana
    restart: unless-stopped
    # Grafana UI restricted - only exposed for internal access
    ports:
      - "127.0.0.1:3001:3000"  # Bound to localhost only (port 3001 to avoid conflicts)
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-changeme}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3000
      - GF_INSTALL_PLUGINS=
    depends_on:
      - prometheus
      - loki
      - tempo
    networks:
      - continumm-internal
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Node Exporter - host metrics collection
  node_exporter:
    image: prom/node-exporter:v1.7.0
    container_name: continumm-node-exporter
    restart: unless-stopped
    # Node exporter port restricted - only accessible internally
    expose:
      - "9100"
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    networks:
      - continumm-internal
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Loki - log aggregation
  loki:
    image: grafana/loki:2.9.8
    container_name: continumm-loki
    restart: unless-stopped
    expose:
      - "3100"
    command:
      - "-config.file=/etc/loki/loki.yml"
    volumes:
      - ./loki/loki.yml:/etc/loki/loki.yml:ro
      - loki-data:/loki
    networks:
      - continumm-internal
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  postgres:
    image: postgres:16-alpine
    container_name: continumm-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-continumm}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-continumm}
      - POSTGRES_DB=${POSTGRES_DB:-continumm}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - continumm-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-continumm}"]
      interval: 30s
      timeout: 5s
      retries: 5

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: continumm-alertmanager
    restart: unless-stopped
    expose:
      - "9093"
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    networks:
      - continumm-internal

  tempo:
    image: grafana/tempo:2.4.0
    container_name: continumm-tempo
    restart: unless-stopped
    expose:
      - "3200"
      - "4317"
    volumes:
      - ./tempo/tempo.yml:/etc/tempo.yml:ro
    command:
      - "-config.file=/etc/tempo.yml"
    networks:
      - continumm-internal