# Nginx Configuration for Continumm Backend
# Production setup with zero-downtime reloads and health-aware routing

upstream backend {
    # Backend service is only accessible via internal network
    # Health-aware routing: mark server down if health checks fail
    server backend:8000 max_fails=3 fail_timeout=30s;
    
    # Connection pooling for performance
    keepalive 32;
    keepalive_timeout 60s;
    keepalive_requests 100;
    
    # For zero-downtime deploys, Nginx will:
    # 1. Continue routing to healthy backends
    # 2. Stop sending traffic to failing backends
    # 3. Resume traffic when backend becomes healthy
}

# Rate limiting zone
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

server {
    listen 80;
    server_name _;
    
    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    
    # Access and error logs
    access_log /var/log/nginx/access.log combined;
    error_log /var/log/nginx/error.log warn;
    
    # Backend API proxy
    location / {
        # Rate limiting
        limit_req zone=api_limit burst=20 nodelay;
        
        # Proxy settings
        proxy_pass http://backend;
        proxy_http_version 1.1;
        
        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        
        # Timeouts - explicitly defined for control
        # Connection timeout: time to establish connection to backend
        proxy_connect_timeout 5s;
        # Send timeout: time between successive write operations
        proxy_send_timeout 60s;
        # Read timeout: time between successive read operations
        proxy_read_timeout 60s;
        
        # Next upstream: retry on specific errors
        proxy_next_upstream error timeout http_500 http_502 http_503;
        proxy_next_upstream_tries 2;
        proxy_next_upstream_timeout 10s;
        
    # Used for both external health checks and internal health-aware routing
    location /health {
        proxy_pass http://backend/health;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        
        # Fast timeout for health checks
        proxy_connect_timeout 2s;
        proxy_read_timeout 2s;
        
        # Don't retry on health check
        proxy_next_upstream off;
        
        proxy_busy_buffers_size 8k;
        
        # Error handling during backend unavailability
        proxy_intercept_errors off;
    }
    
    # Health check endpoint (no rate limiting)
    location /health {
        proxy_pass http://backend/health;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        access_log off;
    }
    
    # Nginx status for monitoring
    location /nginx_status {
        stub_status on;
        access_log off;
        # Restrict to internal network only
        allow 172.16.0.0/12;
        deny all;
    }
}
